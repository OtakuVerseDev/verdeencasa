name: CI Checks

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Grep for forbidden color literal
        run: |
          if grep -R --line-number "#059669" src/ public/; then
            echo "Forbidden literal '#059669' found"; exit 1; fi
      - name: Build
        run: npm run build
