name: Build and Basic Checks

on:
  push:
    branches: [ feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Style check (no hard-coded accent)
        run: |
          if grep -R "#059669" src/ public/ ; then
            echo "Found forbidden color literal #059669"; exit 1; fi
