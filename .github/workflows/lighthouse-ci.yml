name: Lighthouse CI (lightweight)

on:
  push:
    branches: [ 'feature/*', '**' ]
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Quick style check (no literal #059669)
        run: |
          if grep -R "#059669" -n src public; then echo "Found forbidden color #059669" && exit 1; else echo "Style check passed"; fi
